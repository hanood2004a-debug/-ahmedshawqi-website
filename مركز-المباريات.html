<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز المباريات | أحمد شوقي - Sports Docs</title>
<meta name="description" content="نتائج مباشرة، مباريات قادمة، ترتيب، وأخبار أهم دوريات ومسابقات كرة القدم حول العالم">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0b09;--panel:#151210;--panel-2:#1b1714;--gold:#c9a24d;--gold-soft:#e8caa0;--gold-line:rgba(201,162,77,.35);--text:#f2ece1;--text-dim:#a89c8a;--text-faint:#6b6155;--green:#3fae6a;--red:#c85b4a;--radius:2px;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;}
  .mc-wrap{max-width:1200px;margin:0 auto;padding:24px 20px 80px;}
  .mc-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
  .mc-title{font-size:1.6rem;font-weight:900;color:var(--text);margin:0;}
  .mc-title .accent{color:var(--gold);}
  .mc-sub{color:var(--text-dim);font-size:.85rem;margin-top:4px;}
  a{color:inherit;text-decoration:none;}
  .day-strip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--gold-line);border-radius:var(--radius);padding:8px 12px;overflow-x:auto;margin-bottom:22px;}
  .day-strip::-webkit-scrollbar{height:4px;}.day-strip::-webkit-scrollbar-thumb{background:var(--gold-line);}
  .day-btn{flex:0 0 auto;background:transparent;border:none;color:var(--text-dim);font-family:'Tajawal';font-size:.85rem;padding:8px 14px;border-radius:var(--radius);cursor:pointer;white-space:nowrap;transition:background .15s,color .15s;}
  .day-btn:hover{color:var(--text);}
  .day-btn.active{background:var(--gold);color:#161310;font-weight:700;}
  .day-nav{background:transparent;border:1px solid var(--gold-line);color:var(--gold);width:32px;height:32px;border-radius:50%;cursor:pointer;flex:0 0 auto;font-size:.9rem;}
  .comp-select{margin-inline-start:auto;background:var(--panel-2);border:1px solid var(--gold-line);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-family:'Tajawal';font-size:.85rem;}
  .league-group{margin-bottom:18px;border:1px solid var(--gold-line);border-radius:var(--radius);overflow:hidden;}
  .league-head{background:var(--panel-2);padding:10px 16px;font-weight:700;font-size:.9rem;display:flex;justify-content:space-between;color:var(--gold-soft);}
  .match-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--panel);border-top:1px solid rgba(255,255,255,.04);gap:10px;flex-wrap:wrap;}
  .team{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .team.away{flex-direction:row-reverse;text-align:left;}
  .team-badge{width:26px;height:26px;border-radius:50%;object-fit:contain;background:#000;flex:0 0 auto;}
  .team-badge-fallback{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--gold-line);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--gold);flex:0 0 auto;}
  .team-name{font-size:.9rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .match-center-col{flex:0 0 auto;text-align:center;min-width:90px;}
  .match-score{font-family:'Space Mono',monospace;font-weight:700;font-size:1.15rem;color:var(--gold);}
  .match-time{font-size:.7rem;color:var(--text-dim);margin-top:2px;}
  .match-status{font-size:.65rem;color:var(--text-faint);margin-top:2px;}
  .match-detail-toggle{font-size:.7rem;color:var(--gold-soft);background:transparent;border:1px solid var(--gold-line);border-radius:var(--radius);padding:4px 10px;cursor:pointer;flex:0 0 auto;}
  .match-details{width:100%;padding:14px 16px;background:#100e0b;border-top:1px solid var(--gold-line);display:none;}
  .match-details.open{display:block;}
  .detail-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .detail-tab{background:transparent;border:1px solid var(--gold-line);color:var(--text-dim);font-size:.75rem;padding:5px 12px;border-radius:var(--radius);cursor:pointer;}
  .detail-tab.active{background:var(--gold);color:#161310;}
  .detail-pane{display:none;}.detail-pane.active{display:block;}
  .goal-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;border-bottom:1px dashed rgba(255,255,255,.06);}
  .goal-row .side{display:flex;align-items:center;gap:6px;}
  .stat-row{margin-bottom:10px;}
  .stat-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-dim);margin-bottom:4px;}
  .stat-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;display:flex;}
  .stat-bar .fill-home{background:var(--gold);}.stat-bar .fill-away{background:var(--text-faint);}
  .empty-msg,.error-msg{text-align:center;color:var(--text-faint);font-size:.8rem;padding:24px 0;}
  .error-msg{color:#d98a7a;}
  .table-toggle-btn{width:100%;text-align:center;background:var(--panel-2);border:1px solid var(--gold-line);color:var(--gold-soft);padding:10px;cursor:pointer;font-family:'Tajawal';font-size:.85rem;border-radius:var(--radius);margin-bottom:10px;}
  .standings-wrap{display:none;overflow-x:auto;}.standings-wrap.open{display:block;}
  table.standings{width:100%;border-collapse:collapse;font-size:.8rem;}
  table.standings th{color:var(--text-dim);font-weight:500;padding:8px 6px;border-bottom:1px solid var(--gold-line);}
  table.standings td{padding:8px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);}
  table.standings td.team-cell{text-align:right;display:flex;align-items:center;gap:8px;}
  .archive-section{margin-top:30px;border-top:1px solid var(--gold-line);padding-top:20px;}
  .archive-input-row{display:flex;gap:8px;margin-bottom:14px;}
  .archive-input-row input{flex:1;background:var(--panel-2);border:1px solid var(--gold-line);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-family:'Tajawal';}
  .archive-input-row button{background:var(--gold);border:none;color:#161310;font-weight:700;padding:10px 20px;border-radius:var(--radius);cursor:pointer;}
  .news-section{margin-top:30px;}
  .news-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);gap:12px;}
  .news-item a{font-size:.85rem;flex:1;}.news-item .arrow{color:var(--gold);font-size:.75rem;flex:0 0 auto;}
  h2.section-h{font-size:1.1rem;display:flex;justify-content:space-between;border-bottom:1px solid var(--gold-line);padding-bottom:10px;margin:0 0 14px;}
  .eyebrow{font-size:.65rem;color:var(--text-faint);letter-spacing:1px;}

  @keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes livePulseBorder{0%,100%{box-shadow:0 0 0 0 rgba(201,162,77,.45)}50%{box-shadow:0 0 0 5px rgba(201,162,77,0)}}
  @keyframes liveDot{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes scoreBump{0%{transform:scale(1)}35%{transform:scale(1.35)}100%{transform:scale(1)}}
  @keyframes slideInRight{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
  .league-group{animation:fadeSlideUp .45s ease both;}
  .league-group:nth-of-type(1){animation-delay:.02s;}.league-group:nth-of-type(2){animation-delay:.08s;}.league-group:nth-of-type(3){animation-delay:.14s;}.league-group:nth-of-type(4){animation-delay:.20s;}.league-group:nth-of-type(5){animation-delay:.26s;}.league-group:nth-of-type(n+6){animation-delay:.30s;}
  .match-row{transition:background .2s ease,box-shadow .25s ease,transform .2s ease;cursor:default;}
  .match-row:hover{background:var(--panel-2);box-shadow:inset 0 0 0 1px var(--gold-line);transform:translateY(-1px);}
  .match-row.is-live{animation:livePulseBorder 2.2s ease-in-out infinite;}
  .live-indicator{display:inline-flex;align-items:center;gap:5px;color:#e05a4a;font-size:.65rem;font-weight:700;margin-top:2px;}
  .live-indicator .dot{width:6px;height:6px;border-radius:50%;background:#e05a4a;animation:liveDot 1.1s ease-in-out infinite;}
  .match-score.bump{animation:scoreBump .5s ease;}
  .match-detail-toggle{transition:background .2s ease,color .2s ease;}
  .match-detail-toggle:hover{background:var(--gold);color:#161310;}
  .match-details{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding:0 16px;}
  .match-details.open{max-height:600px;padding:14px 16px;}
  .news-item{animation:slideInRight .4s ease both;}
  .news-item:nth-of-type(1){animation-delay:.02s;}.news-item:nth-of-type(2){animation-delay:.07s;}.news-item:nth-of-type(3){animation-delay:.12s;}.news-item:nth-of-type(4){animation-delay:.17s;}.news-item:nth-of-type(5){animation-delay:.22s;}.news-item:nth-of-type(6){animation-delay:.27s;}.news-item:nth-of-type(n+7){animation-delay:.30s;}
  .news-item:hover a{color:var(--gold-soft);}.news-item a{transition:color .15s ease;}
  .day-btn{transition:background .2s ease,color .2s ease,transform .15s ease;}.day-btn:active{transform:scale(.95);}
  @media (prefers-reduced-motion:reduce){.league-group,.news-item,.match-row.is-live,.live-indicator .dot,.match-score.bump{animation:none !important;}.match-details{transition:none;}}
</style>
</head>
<body>
<div class="mc-wrap">
  <div class="mc-header">
    <div>
      <h1 class="mc-title">مركز <span class="accent">المباريات</span></h1>
      <div class="mc-sub">نتائج، مواعيد، ترتيب وأخبار لأهم مسابقات كرة القدم</div>
    </div>
    <a href="index.html" style="font-size:.85rem;color:var(--text-dim);border:1px solid var(--gold-line);padding:7px 14px;border-radius:var(--radius);">← الرئيسية</a>
  </div>

  <div class="day-strip" id="dayStrip"></div>
  <div id="competitionsToday"></div>

  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <select id="standingsLeagueSelect" class="comp-select" style="margin-inline-start:0;flex:1;"></select>
  </div>
  <div class="table-toggle-btn" id="tableToggleBtn">عرض جدول الترتيب ▾</div>
  <div class="standings-wrap" id="standingsWrap"><div id="standingsContent"></div></div>

  <div class="archive-section">
    <h2 class="section-h">البحث عن لاعب <span class="eyebrow">PLAYERS</span></h2>
    <div class="archive-input-row">
      <button id="playerSearchBtn">بحث</button>
      <input type="text" id="playerInput" placeholder="اسم اللاعب بالإنجليزي... مثال: Mohamed Salah">
    </div>
    <div id="playerResults"></div>
  </div>

  <div class="archive-section">
    <h2 class="section-h">البحث في الأرشيف <span class="eyebrow">ARCHIVE</span></h2>
    <div class="archive-input-row">
      <button id="archiveSearchBtn">بحث</button>
      <input type="text" id="archiveInput" placeholder="اسم الفريق (عربي أو إنجليزي)... مثال: Real Madrid أو ريال مدريد">
    </div>
    <div id="archiveResults"></div>
  </div>

  <div class="news-section">
    <h2 class="section-h">آخر أخبار الرياضة <span class="eyebrow">NEWS</span></h2>
    <div id="newsResults"><div class="empty-msg">جاري التحميل...</div></div>
  </div>
</div>

<script>
(function(){
  const API_KEY = '123';
  const BASE = 'https://www.thesportsdb.com/api/v1/json/' + API_KEY + '/';

  const LEAGUES = [
    { key:'epl', label:'الإنجليزي', names:['English Premier League'], fallbackId:'4328' },
    { key:'laliga', label:'الإسباني', names:['Spanish La Liga'], fallbackId:'4335' },
    { key:'seriea', label:'الإيطالي', names:['Italian Serie A'], fallbackId:'4332' },
    { key:'bundesliga', label:'الألماني', names:['German Bundesliga'], fallbackId:'4331' },
    { key:'ligue1', label:'الفرنسي', names:['French Ligue 1'], fallbackId:'4334' },
    { key:'ucl', label:'أبطال أوروبا', names:['UEFA Champions League'], fallbackId:'4480' },
    { key:'wc', label:'كأس العالم', names:['FIFA World Cup'], fallbackId:'4429' },
    { key:'euro', label:'يورو', names:['UEFA European Championship'], fallbackId:null },
    { key:'copaamerica', label:'كوبا أمريكا', names:['Copa America'], fallbackId:null },
    { key:'afcon', label:'أمم أفريقيا', names:['African Cup of Nations'], fallbackId:null },
    { key:'asiancup', label:'كأس آسيا', names:['AFC Asian Cup'], fallbackId:null },
    { key:'saudi', label:'السعودي', names:['Saudi Professional League','Saudi Pro League'], fallbackId:null },
    { key:'egypt', label:'المصري', names:['Egyptian Premier League'], fallbackId:null },
    { key:'morocco', label:'المغربي', names:['Botola Pro','Moroccan Botola'], fallbackId:null },
  ];

  const CACHE_TTL=5*60*1000,CACHE_TTL_LONG=7*24*60*60*1000;
  function cacheGet(k,ttl){try{const r=localStorage.getItem(k);if(!r)return null;const o=JSON.parse(r);if(Date.now()-o.t>ttl)return null;return o.v;}catch(e){return null;}}
  function cacheSet(k,v){try{localStorage.setItem(k,JSON.stringify({t:Date.now(),v}));}catch(e){}}
  function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
  async function safeFetchJSON(url,ms=8000){
    const c=new AbortController(),id=setTimeout(()=>c.abort(),ms);
    try{const r=await fetch(url,{signal:c.signal});clearTimeout(id);if(!r.ok)return null;return await r.json();}catch(e){clearTimeout(id);return null;}
  }
  function esc(s){const d=document.createElement('div');d.textContent=(s==null)?'':String(s);return d.innerHTML;}
  function cleanName(s){return(s||'').toString().trim().toLowerCase().replace(/\s+/g,' ');}

  let leagueIdMap=cacheGet('mc_league_ids_v1',CACHE_TTL_LONG);
  async function resolveLeagueIds(){
    if(leagueIdMap)return leagueIdMap;
    const data=await safeFetchJSON(BASE+'search_all_leagues.php?s=Soccer',15000);
    const map={},all=(data&&data.leagues)?data.leagues:[];
    LEAGUES.forEach(function(lg){
      let found=null;
      for(const n of lg.names){
        const cn=cleanName(n);
        found=all.find(e=>{const en=cleanName(e.strLeague),alt=cleanName(e.strLeagueAlternate||'');return en===cn||en.indexOf(cn)!==-1||cn.indexOf(en)!==-1||alt.indexOf(cn)!==-1;});
        if(found)break;
      }
      map[lg.key]=found?{id:found.idLeague,name:found.strLeague}:lg.fallbackId?{id:lg.fallbackId,name:lg.names[0]}:null;
    });
    leagueIdMap=map;cacheSet('mc_league_ids_v1',map);return map;
  }

  async function getTeamBadge(name){
    if(!name)return null;
    const ck='mc_badge_'+cleanName(name);const c=cacheGet(ck,CACHE_TTL_LONG);if(c!==null)return c;
    const d=await safeFetchJSON(BASE+'searchteams.php?t='+encodeURIComponent(name));
    const badge=d&&d.teams&&d.teams[0]?(d.teams[0].strTeamBadge||d.teams[0].strBadge||null):null;
    cacheSet(ck,badge);return badge;
  }
  function renderBadge(container,name){
    const sp=document.createElement('span');sp.className='team-badge-fallback';sp.textContent=(name||'?').charAt(0);container.appendChild(sp);
    getTeamBadge(name).then(url=>{if(url){const img=document.createElement('img');img.className='team-badge';img.src=url;img.alt=name;img.onerror=()=>img.remove();container.replaceChild(img,sp);}});
  }

  const dayStrip=document.getElementById('dayStrip');
  let selectedDate=new Date();
  function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  let baseOffset=0;
  function shiftDays(dir){baseOffset+=dir*5;buildDayStripAtBase();}
  function buildDayStripAtBase(){
    dayStrip.innerHTML='';
    const pb=document.createElement('button');pb.className='day-nav';pb.textContent='◀';pb.onclick=()=>shiftDays(-1);dayStrip.appendChild(pb);
    for(let i=-2;i<=2;i++){
      const off=baseOffset+i,d=new Date();d.setDate(d.getDate()+off);
      const btn=document.createElement('button');btn.className='day-btn'+(fmtDate(d)===fmtDate(selectedDate)?' active':'');
      btn.textContent=off===0?'اليوم':off===-1?'أمس':off===1?'غدًا':d.getDate()+'/'+(d.getMonth()+1);
      btn.onclick=(dd=>()=>{selectedDate=dd;buildDayStripAtBase();loadDayMatches();})(d);
      dayStrip.appendChild(btn);
    }
    const nb=document.createElement('button');nb.className='day-nav';nb.textContent='▶';nb.onclick=()=>shiftDays(1);dayStrip.appendChild(nb);
  }

  const compContainer=document.getElementById('competitionsToday');
  async function loadDayMatches(){
    compContainer.innerHTML='<div class="empty-msg">جاري تحميل المباريات...</div>';
    const ids=await resolveLeagueIds();
    const dateStr=fmtDate(selectedDate),ck='mc_day_'+dateStr;
    let results=cacheGet(ck,CACHE_TTL);
    if(!results){
      results=[];
      for(const lg of LEAGUES.filter(lg=>ids[lg.key])){
        const d=await safeFetchJSON(BASE+'eventsday.php?d='+dateStr+'&l='+ids[lg.key].id);
        if(d&&d.events&&d.events.length)results.push({label:lg.label,events:d.events});
        await sleep(300);
      }
      cacheSet(ck,results);
    }
    compContainer.innerHTML='';
    if(!results.length){compContainer.innerHTML='<div class="empty-msg">لا توجد مباريات في هذا اليوم للمسابقات المختارة</div>';return;}
    results.forEach(g=>{
      const wrap=document.createElement('div');wrap.className='league-group';
      const head=document.createElement('div');head.className='league-head';head.innerHTML='<span>'+esc(g.label)+'</span>';
      wrap.appendChild(head);g.events.forEach(ev=>wrap.appendChild(renderMatchRow(ev)));compContainer.appendChild(wrap);
    });
  }

  function localTimeFromEvent(ev){
    try{
      let d;
      if(ev.strTimestamp){d=new Date(ev.strTimestamp.replace(' ','T')+(ev.strTimestamp.indexOf('Z')===-1?'Z':''));}
      else if(ev.dateEvent&&ev.strTime){d=new Date(ev.dateEvent+'T'+ev.strTime+'Z');}
      else return '--:--';
      if(isNaN(d.getTime()))return ev.strTime?ev.strTime.substring(0,5):'--:--';
      return d.toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit',hour12:false});
    }catch(e){return ev.strTime?ev.strTime.substring(0,5):'--:--';}
  }
  function localDateFromEvent(ev){
    try{
      let d;
      if(ev.strTimestamp){d=new Date(ev.strTimestamp.replace(' ','T')+(ev.strTimestamp.indexOf('Z')===-1?'Z':''));}
      else if(ev.dateEvent&&ev.strTime){d=new Date(ev.dateEvent+'T'+ev.strTime+'Z');}
      else return ev.dateEvent||'';
      if(isNaN(d.getTime()))return ev.dateEvent||'';
      return d.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit'});
    }catch(e){return ev.dateEvent||'';}
  }
  function isLikelyLive(ev){
    if(!ev.dateEvent||!ev.strTime)return false;
    if(ev.dateEvent!==fmtDate(new Date()))return false;
    if(ev.strStatus==='Match Finished'||(ev.strStatus||'').toLowerCase().includes('finished'))return false;
    const kick=new Date(ev.dateEvent+'T'+ev.strTime+'Z'),mins=(new Date()-kick)/60000;
    return mins>0&&mins<130;
  }

  function renderMatchRow(ev){
    const row=document.createElement('div');row.className='match-row';
    if(isLikelyLive(ev))row.classList.add('is-live');
    const home=document.createElement('div');home.className='team';
    renderBadge(home,ev.strHomeTeam);const hn=document.createElement('span');hn.className='team-name';hn.textContent=ev.strHomeTeam||'—';home.appendChild(hn);
    const away=document.createElement('div');away.className='team away';
    const an=document.createElement('span');an.className='team-name';an.textContent=ev.strAwayTeam||'—';away.appendChild(an);renderBadge(away,ev.strAwayTeam);
    const center=document.createElement('div');center.className='match-center-col';
    const scored=ev.intHomeScore!=null&&ev.intHomeScore!=='';
    if(scored){
      const sc=document.createElement('div');sc.className='match-score';sc.textContent=ev.intHomeScore+' - '+ev.intAwayScore;center.appendChild(sc);
      requestAnimationFrame(()=>sc.classList.add('bump'));
      const st=document.createElement('div');
      if(isLikelyLive(ev)){st.className='live-indicator';st.innerHTML='<span class="dot"></span> مباشر الآن';}
      else{st.className='match-status';st.textContent='انتهت';}
      center.appendChild(st);
    }else{
      const tm=document.createElement('div');tm.className='match-time';tm.textContent=localTimeFromEvent(ev);center.appendChild(tm);
    }
    const dt=document.createElement('div');dt.className='match-time';dt.textContent=localDateFromEvent(ev);center.appendChild(dt);
    const toggle=document.createElement('button');toggle.className='match-detail-toggle';toggle.textContent='التفاصيل';
    row.appendChild(home);row.appendChild(center);row.appendChild(away);row.appendChild(toggle);
    const details=document.createElement('div');details.className='match-details';
    const tabsWrap=buildDetailTabs(ev);details.appendChild(tabsWrap);row.appendChild(details);
    toggle.onclick=()=>{const op=!details.classList.contains('open');details.classList.toggle('open');if(op&&tabsWrap.loadOnOpen)tabsWrap.loadOnOpen();};
    const cont=document.createElement('div');cont.style.width='100%';cont.appendChild(row);return cont;
  }

  function buildDetailTabs(ev){
    const wrap=document.createElement('div');
    const tabs=document.createElement('div');tabs.className='detail-tabs';
    const gt=document.createElement('button');gt.className='detail-tab active';gt.textContent='الأهداف';
    const st=document.createElement('button');st.className='detail-tab';st.textContent='الإحصائيات';
    tabs.appendChild(gt);tabs.appendChild(st);wrap.appendChild(tabs);
    const gp=document.createElement('div');gp.className='detail-pane active';gp.innerHTML='<div class="empty-msg">جاري التحميل...</div>';
    const sp=document.createElement('div');sp.className='detail-pane';sp.innerHTML='<div class="empty-msg">جاري التحميل...</div>';
    wrap.appendChild(gp);wrap.appendChild(sp);
    gt.onclick=()=>{gt.classList.add('active');st.classList.remove('active');gp.classList.add('active');sp.classList.remove('active');};
    st.onclick=()=>{st.classList.add('active');gt.classList.remove('active');sp.classList.add('active');gp.classList.remove('active');};
    let loaded=false;wrap.loadOnOpen=()=>{if(loaded)return;loaded=true;loadGoals(ev,gp);loadStats(ev,sp);};
    return wrap;
  }

  function extractMinute(g){
    for(const c of[g.strTime,g.intTime,g.strTimeline,g.strTimelineDetail,g.strMinute]){if(c!=null&&c!==''){const n=String(c).replace(/\D/g,'');if(n)return n+"'";}}return'—';
  }
  async function loadGoals(ev,pane){
    const d=await safeFetchJSON(BASE+'lookuptimeline.php?id='+ev.idEvent);
    const tl=d&&(d.timeline||d.Timeline);
    if(!tl||!tl.length){pane.innerHTML='<div class="empty-msg">غير متوفر لهذه المباراة</div>';return;}
    const goals=tl.filter(t=>(t.strTimeline||t.strEvent||t.strEventType||'').toLowerCase().includes('goal'));
    if(!goals.length){pane.innerHTML='<div class="empty-msg">لا توجد أهداف مسجلة بهذه المباراة</div>';return;}
    pane.innerHTML='';
    goals.forEach(g=>{const r=document.createElement('div');r.className='goal-row';r.innerHTML='<span class="side">⚽ '+esc(g.strPlayer||g.strTimelineDetail||'غير معروف')+'</span><span>'+esc(extractMinute(g))+'</span>';pane.appendChild(r);});
  }
  async function loadStats(ev,pane){
    const d=await safeFetchJSON(BASE+'lookupeventstats.php?id='+ev.idEvent);
    const stats=d&&(d.eventstats||d.eventStats);
    if(!stats||!stats.length){pane.innerHTML='<div class="empty-msg">الإحصائيات غير متوفرة لهذه المباراة</div>';return;}
    pane.innerHTML='';
    stats.forEach(s=>{const h=parseFloat(s.intHome)||0,a=parseFloat(s.intAway)||0,total=h+a||1;const r=document.createElement('div');r.className='stat-row';r.innerHTML='<div class="stat-label"><span>'+h+'</span><span>'+esc(s.strStat||'')+'</span><span>'+a+'</span></div><div class="stat-bar"><span class="fill-home" style="width:'+(h/total*100)+'%"></span><span class="fill-away" style="width:'+(a/total*100)+'%"></span></div>';pane.appendChild(r);});
  }

  const tableToggleBtn=document.getElementById('tableToggleBtn'),standingsWrap=document.getElementById('standingsWrap'),standingsLeagueSelect=document.getElementById('standingsLeagueSelect'),loadedFor={};
  async function populateStandingsLeagueSelect(){
    const ids=await resolveLeagueIds();standingsLeagueSelect.innerHTML='';
    LEAGUES.forEach(lg=>{if(!ids[lg.key])return;const o=document.createElement('option');o.value=lg.key;o.textContent=lg.label;standingsLeagueSelect.appendChild(o);});
  }
  async function loadStandings(){
    const ids=await resolveLeagueIds(),key=standingsLeagueSelect.value,info=ids[key];
    const cont=document.getElementById('standingsContent');
    if(!info){cont.innerHTML='<div class="error-msg">تعذر تحميل الترتيب لهذه المسابقة</div>';return;}
    cont.innerHTML='<div class="empty-msg">جاري التحميل...</div>';
    const d=await safeFetchJSON(BASE+'lookuptable.php?l='+info.id+'&s=2025-2026',15000);
    if(!d||!d.table){cont.innerHTML='<div class="error-msg">تعذّر تحميل جدول الترتيب (قد لا يكون متاحًا لهذه المسابقة)</div>';return;}
    let html='<table class="standings"><thead><tr><th>#</th><th>الفريق</th><th>لعب</th><th>فرق</th><th>نقاط</th></tr></thead><tbody>';
    d.table.forEach(r=>{html+='<tr><td>'+esc(r.intRank)+'</td><td class="team-cell">'+esc(r.strTeam)+'</td><td>'+esc(r.intPlayed)+'</td><td>'+esc(r.intGoalDifference)+'</td><td>'+esc(r.intPoints)+'</td></tr>';});
    html+='</tbody></table>';cont.innerHTML=html;
  }
  tableToggleBtn.onclick=async function(){
    standingsWrap.classList.toggle('open');
    tableToggleBtn.textContent=standingsWrap.classList.contains('open')?'إخفاء جدول الترتيب ▴':'عرض جدول الترتيب ▾';
    if(standingsWrap.classList.contains('open')&&!loadedFor[standingsLeagueSelect.value]){loadedFor[standingsLeagueSelect.value]=true;await loadStandings();}
  };
  standingsLeagueSelect.onchange=()=>{if(standingsWrap.classList.contains('open'))loadStandings();};

  // Player search
  document.getElementById('playerSearchBtn').onclick=async function(){
    const inp=document.getElementById('playerInput').value.trim(),res=document.getElementById('playerResults');
    if(!inp)return;
    res.innerHTML='<div class="empty-msg">جاري البحث...</div>';
    const d=await safeFetchJSON(BASE+'searchplayers.php?p='+encodeURIComponent(inp.replace(/\s+/g,'_')));
    const player=d&&d.player&&d.player[0];
    if(!player){res.innerHTML=/[\u0600-\u06FF]/.test(inp)?'<div class="empty-msg">لم يتم العثور على اللاعب. جرّب البحث بالاسم الإنجليزي.</div>':'<div class="empty-msg">لم يتم العثور على نتائج.</div>';return;}
    const photo=player.strCutout||player.strThumb||player.strRender||null;
    let age='';
    if(player.dateBorn){const b=new Date(player.dateBorn);if(!isNaN(b.getTime()))age=Math.floor((Date.now()-b.getTime())/(365.25*24*60*60*1000))+' سنة';}
    let html='<div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;">';
    if(photo)html+='<img src="'+esc(photo)+'" alt="'+esc(player.strPlayer)+'" style="width:110px;height:110px;object-fit:cover;border-radius:4px;border:1px solid var(--gold-line);background:#000;" onerror="this.remove()">';
    html+='<div style="flex:1;min-width:200px;"><h3 style="color:var(--gold-soft);font-size:1.1rem;margin:0 0 8px;">'+esc(player.strPlayer)+'</h3><div style="font-size:.85rem;color:var(--text-dim);line-height:1.9;">';
    if(player.strTeam)html+='<div>الفريق الحالي: <span style="color:var(--text);">'+esc(player.strTeam)+'</span></div>';
    if(player.strPosition)html+='<div>المركز: <span style="color:var(--text);">'+esc(player.strPosition)+'</span></div>';
    if(player.strNationality)html+='<div>الجنسية: <span style="color:var(--text);">'+esc(player.strNationality)+'</span></div>';
    if(age)html+='<div>العمر: <span style="color:var(--text);">'+esc(age)+'</span></div>';
    html+='</div></div></div>';
    res.innerHTML=html;
  };
  document.getElementById('playerInput').onkeydown=e=>{if(e.key==='Enter')document.getElementById('playerSearchBtn').click();};

  const AR_EN={'الأهلي':'Al Ahly','الزمالك':'Zamalek','ريال مدريد':'Real Madrid','برشلونة':'Barcelona','مانشستر يونايتد':'Manchester United','مانشستر سيتي':'Manchester City','ليفربول':'Liverpool','تشيلسي':'Chelsea','أرسنال':'Arsenal','يوفنتوس':'Juventus','ميلان':'AC Milan','إنتر ميلان':'Inter','بايرن ميونخ':'Bayern Munich','باريس سان جيرمان':'Paris Saint-Germain','أتلتيكو مدريد':'Atletico Madrid','توتنهام':'Tottenham Hotspur','الهلال':'Al Hilal','النصر':'Al Nassr','الاتحاد':'Al Ittihad','الوداد':'Wydad AC','الرجاء':'Raja Casablanca','الترجي':'Esperance Sportive de Tunis'};
  document.getElementById('archiveSearchBtn').onclick=async function(){
    const inp=document.getElementById('archiveInput').value.trim(),res=document.getElementById('archiveResults');
    if(!inp)return;
    const term=AR_EN[inp]||inp;
    res.innerHTML='<div class="empty-msg">جاري البحث...</div>';
    const td=await safeFetchJSON(BASE+'searchteams.php?t='+encodeURIComponent(term));
    if(!td||!td.teams||!td.teams[0]){res.innerHTML=/[\u0600-\u06FF]/.test(inp)?'<div class="empty-msg">لم يتم العثور على الفريق. جرّب البحث بالاسم الإنجليزي للفريق.</div>':'<div class="empty-msg">لم يتم العثور على نتائج.</div>';return;}
    const team=td.teams[0];
    const [pd,nd,pld]=await Promise.all([safeFetchJSON(BASE+'eventslast.php?id='+team.idTeam),safeFetchJSON(BASE+'eventsnext.php?id='+team.idTeam),safeFetchJSON(BASE+'lookup_all_players.php?id='+team.idTeam)]);
    let html='<h3 style="color:var(--gold-soft);font-size:1rem;">'+esc(team.strTeam)+'</h3><p style="color:var(--text-faint);font-size:.8rem;">آخر 15 نتيجة ومباريات قادمة (الحد المتاح مجانًا — لا يوجد أرشيف كامل عبر التاريخ)</p>';
    const past=(pd&&pd.results)||[];
    if(past.length){html+='<h4 style="color:var(--text-dim);font-size:.85rem;margin-top:14px;">آخر النتائج</h4>';past.forEach(ev=>{html+='<div class="goal-row"><span>'+esc(ev.strHomeTeam)+' '+esc(ev.intHomeScore)+' - '+esc(ev.intAwayScore)+' '+esc(ev.strAwayTeam)+'</span><span>'+esc(ev.dateEvent)+'</span></div>';});}
    const next=(nd&&nd.events)||[];
    if(next.length){html+='<h4 style="color:var(--text-dim);font-size:.85rem;margin-top:14px;">مباريات قادمة</h4>';next.forEach(ev=>{html+='<div class="goal-row"><span>'+esc(ev.strHomeTeam)+' vs '+esc(ev.strAwayTeam)+'</span><span>'+esc(ev.dateEvent)+'</span></div>';});}
    const players=(pld&&pld.player)||[];
    if(players.length){html+='<h4 style="color:var(--text-dim);font-size:.85rem;margin-top:14px;">اللاعبون الحاليون</h4><div style="display:flex;flex-wrap:wrap;gap:8px;">';players.slice(0,20).forEach(p=>{html+='<span style="background:var(--panel-2);padding:4px 10px;border-radius:2px;font-size:.75rem;">'+esc(p.strPlayer)+'</span>';});html+='</div>';}
    if(!past.length&&!next.length&&!players.length)html+='<div class="empty-msg">لا توجد بيانات إضافية متاحة لهذا الفريق حاليًا</div>';
    res.innerHTML=html;
  };
  document.getElementById('archiveInput').onkeydown=e=>{if(e.key==='Enter')document.getElementById('archiveSearchBtn').click();};

  function renderNewsItems(items,cont){
    cont.innerHTML='';
    items.forEach(item=>{const div=document.createElement('div');div.className='news-item';const a=document.createElement('a');a.href=item.link;a.target='_blank';a.rel='noopener';a.textContent=item.title;const arr=document.createElement('span');arr.className='arrow';arr.textContent='← اقرأ المزيد';div.appendChild(a);div.appendChild(arr);cont.appendChild(div);});
  }
  function parseRSS(text){
    try{
      const xml=new DOMParser().parseFromString(text,'text/xml');
      return [...xml.querySelectorAll('item')].slice(0,8).map(item=>({
        title:(item.querySelector('title')?.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim(),
        link:(item.querySelector('link')?.textContent||item.querySelector('link')?.nextSibling?.textContent||'#').trim()
      })).filter(i=>i.title);
    }catch(e){return [];}
  }
  async function loadNews(){
    const cont=document.getElementById('newsResults');
    const RSS='https://feeds.bbci.co.uk/arabic/sport/rss.xml';
    // Try Cloudflare Function first (works on Pages), then proxy fallback
    let items=[];
    const fn=await safeFetchJSON('/api/news',8000);
    if(fn&&!fn.error&&fn.items&&fn.items.length){items=fn.items;}
    else{
      const proxy=await safeFetchJSON('https://api.allorigins.win/get?url='+encodeURIComponent(RSS),10000);
      if(proxy&&proxy.contents){items=parseRSS(proxy.contents);}
    }
    if(!items.length){cont.innerHTML='<div class="error-msg">تعذّر تحميل الأخبار حاليًا</div>';return;}
    renderNewsItems(items,cont);
  }

  buildDayStripAtBase();loadDayMatches();loadNews();populateStandingsLeagueSelect();
})();
</script>
