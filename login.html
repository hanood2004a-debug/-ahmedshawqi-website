<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل الدخول | أحمد شوقي</title>
<meta name="description" content="سجّل دخولك لمتابعة حالة مشروعك والوصول لمزايا العملاء المميزين.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#100f0d; color:#f4f1ea; font-family:'Tajawal',sans-serif; min-height:100vh; }
  .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { width:100%; max-width:400px; background:#151210; border:1px solid rgba(203,162,90,0.25); border-radius:8px; padding:36px 28px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .logo-row { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px; }
  .logo-row img { width:38px; height:38px; border-radius:50%; object-fit:cover; border:1px solid rgba(203,162,90,0.4); }
  h1 { font-size:19px; font-weight:800; text-align:center; margin:10px 0 4px; color:#f4f1ea; }
  .subtitle { text-align:center; color:#8a857c; font-size:13px; margin:0 0 26px; }
  .tabs { display:flex; background:#0c0b09; border-radius:6px; padding:4px; margin-bottom:22px; }
  .tab-btn { flex:1; border:none; background:transparent; color:#8a857c; font-family:'Tajawal',sans-serif; font-size:13.5px; font-weight:700; padding:9px; border-radius:5px; cursor:pointer; transition:.2s; }
  .tab-btn.active { background:#cba35a; color:#161310; }
  label { display:block; color:#e8caa0; font-size:13px; margin:0 0 6px; }
  .field { margin-bottom:16px; }
  input { width:100%; background:#0e0d0b; border:1px solid rgba(203,162,90,0.3); color:#f4f1ea; padding:11px 13px; border-radius:5px; font-family:'Tajawal',sans-serif; font-size:14px; }
  input:focus { outline:none; border-color:#cba35a; }
  .submit-btn { width:100%; background:#cba35a; border:none; color:#161310; font-weight:800; padding:12px; border-radius:5px; cursor:pointer; font-family:'Tajawal',sans-serif; font-size:14.5px; margin-top:6px; transition:.2s; }
  .submit-btn:hover { opacity:.9; }
  .submit-btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { text-align:center; font-size:13px; margin-top:14px; min-height:18px; }
  .msg.error { color:#e07a63; }
  .msg.success { color:#6fbf8b; }
  .back-link { display:block; text-align:center; margin-top:22px; color:#8a857c; font-size:12.5px; text-decoration:none; }
  .back-link:hover { color:#cba35a; }
  .social-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; background:#0e0d0b; border:1px solid rgba(203,162,90,0.3); color:#f4f1ea; padding:11px 13px; border-radius:5px; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:10px; transition:.2s; text-decoration:none; }
  .social-btn:hover { border-color:#cba35a; background:#151210; }
  .social-btn svg { width:18px; height:18px; flex-shrink:0; }
  .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:#8a857c; font-size:12px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(203,162,90,0.2); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo-row"><img src="assets/logo.jpg" alt="أحمد شوقي"></div>
    <h1>أهلاً فيك</h1>
    <p class="subtitle">سجّل دخولك لمتابعة حالة مشروعك</p>

    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">تسجيل الدخول</button>
      <button class="tab-btn" id="tabSignup">حساب جديد</button>
    </div>

    <button type="button" class="social-btn" id="googleBtn">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.8 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.7 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.7 2.1-2.1 3.9-3.9 5.2l6.2 5.2C40.9 35.9 44 30.5 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      المتابعة عبر Google
    </button>
    <button type="button" class="social-btn" id="facebookBtn">
      <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.13 8.44 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.77-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99C18.34 21.13 22 16.99 22 12z"/></svg>
      المتابعة عبر Facebook
    </button>
    <div class="divider">أو</div>

    <form id="authForm">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="password" required autocomplete="current-password" minlength="6">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">تسجيل الدخول</button>
    </form>
    <div class="msg" id="msg"></div>
    <a href="index.html" class="back-link">← رجوع للموقع الرئيسي</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ztuflxgrpibcuvpvgwjf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0dWZseGdycGliY3V2cHZnd2pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTA0MjcsImV4cCI6MjA5OTI2NjQyN30.ThkQEYPrhhi0nz81iw-xO_A7f-l4F7QPjYXg8iqwRfc';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });

  let mode = 'login';
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const submitBtn = document.getElementById('submitBtn');
  const msgEl = document.getElementById('msg');
  const form = document.getElementById('authForm');

  function setMode(m) {
    mode = m;
    tabLogin.classList.toggle('active', m === 'login');
    tabSignup.classList.toggle('active', m === 'signup');
    submitBtn.textContent = m === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب';
    msgEl.textContent = '';
    msgEl.className = 'msg';
  }
  tabLogin.addEventListener('click', () => setMode('login'));
  tabSignup.addEventListener('click', () => setMode('signup'));

  document.getElementById('googleBtn').addEventListener('click', async () => {
    await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
  });
  document.getElementById('facebookBtn').addEventListener('click', async () => {
    await sb.auth.signInWithOAuth({ provider: 'facebook', options: { redirectTo: window.location.origin + '/dashboard.html' } });
  });

  // If already logged in, go straight to dashboard
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    submitBtn.disabled = true;
    msgEl.textContent = '';
    msgEl.className = 'msg';

    try {
      if (mode === 'login') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'dashboard.html';
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        msgEl.textContent = 'تم إنشاء الحساب! تحقق من بريدك الإلكتروني لتأكيد التسجيل.';
        msgEl.className = 'msg success';
      }
    } catch (err) {
      msgEl.textContent = err.message === 'Invalid login credentials'
        ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة'
        : (err.message || 'حدث خطأ، حاول مرة أخرى');
      msgEl.className = 'msg error';
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
