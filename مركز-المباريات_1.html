<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mcHtml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز المباريات | أحمد شوقي - Sports Docs</title>
<meta name="description" content="نتائج مباشرة، مباريات قادمة، ترتيب، وأخبار أهم دوريات ومسابقات كرة القدم حول العالم">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0b09; --panel:#151210; --panel-2:#1b1714;
    --gold:#c9a24d; --gold-soft:#e8caa0; --gold-line:rgba(201,162,77,.35);
    --text:#f2ece1; --text-dim:#a89c8a; --text-faint:#6b6155;
    --green:#3fae6a; --red:#c85b4a;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;}
  .mc-wrap{max-width:1200px;margin:0 auto;padding:24px 20px 80px;}
  .mc-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
  .mc-title{font-size:1.6rem;font-weight:900;color:var(--text);margin:0;}
  .mc-title .accent{color:var(--gold);}
  .mc-sub{color:var(--text-dim);font-size:.85rem;margin-top:4px;}
  a{color:inherit;text-decoration:none;}

  /* Day strip */
  .day-strip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--gold-line);border-radius:var(--radius);padding:8px 12px;overflow-x:auto;margin-bottom:22px;}
  .day-strip::-webkit-scrollbar{height:4px;}
  .day-strip::-webkit-scrollbar-thumb{background:var(--gold-line);}
  .day-btn{flex:0 0 auto;background:transparent;border:none;color:var(--text-dim);font-family:'Tajawal';font-size:.85rem;padding:8px 14px;border-radius:var(--radius);cursor:pointer;white-space:nowrap;transition:background .15s,color .15s;}
  .day-btn:hover{color:var(--text);}
  .day-btn.active{background:var(--gold);color:#161310;font-weight:700;}
  .day-nav{background:transparent;border:1px solid var(--gold-line);color:var(--gold);width:32px;height:32px;border-radius:50%;cursor:pointer;flex:0 0 auto;font-size:.9rem;}
  .comp-select{margin-inline-start:auto;background:var(--panel-2);border:1px solid var(--gold-line);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-family:'Tajawal';font-size:.85rem;}

  /* League groups */
  .league-group{margin-bottom:18px;border:1px solid var(--gold-line);border-radius:var(--radius);overflow:hidden;}
  .league-head{background:var(--panel-2);padding:10px 16px;font-weight:700;font-size:.9rem;display:flex;justify-content:space-between;color:var(--gold-soft);}
  .match-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--panel);border-top:1px solid rgba(255,255,255,.04);gap:10px;flex-wrap:wrap;}
  .team{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .team.away{flex-direction:row-reverse;text-align:left;}
  .team-badge{width:26px;height:26px;border-radius:50%;object-fit:contain;background:#000;flex:0 0 auto;}
  .team-badge-fallback{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--gold-line);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--gold);flex:0 0 auto;}
  .team-name{font-size:.9rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .match-center-col{flex:0 0 auto;text-align:center;min-width:90px;}
  .match-score{font-family:'Space Mono',monospace;font-weight:700;font-size:1.15rem;color:var(--gold);}
  .match-time{font-size:.7rem;color:var(--text-dim);margin-top:2px;}
  .match-status{font-size:.65rem;color:var(--text-faint);margin-top:2px;}
  .match-detail-toggle{font-size:.7rem;color:var(--gold-soft);background:transparent;border:1px solid var(--gold-line);border-radius:var(--radius);padding:4px 10px;cursor:pointer;flex:0 0 auto;}

  .match-details{width:100%;padding:14px 16px;background:#100e0b;border-top:1px solid var(--gold-line);display:none;}
  .match-details.open{display:block;}
  .detail-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .detail-tab{background:transparent;border:1px solid var(--gold-line);color:var(--text-dim);font-size:.75rem;padding:5px 12px;border-radius:var(--radius);cursor:pointer;}
  .detail-tab.active{background:var(--gold);color:#161310;}
  .detail-pane{display:none;}
  .detail-pane.active{display:block;}
  .goal-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;border-bottom:1px dashed rgba(255,255,255,.06);}
  .goal-row .side{display:flex;align-items:center;gap:6px;}
  .stat-row{margin-bottom:10px;}
  .stat-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-dim);margin-bottom:4px;}
  .stat-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;display:flex;}
  .stat-bar .fill-home{background:var(--gold);}
  .stat-bar .fill-away{background:var(--text-faint);}
  .empty-msg,.error-msg{text-align:center;color:var(--text-faint);font-size:.8rem;padding:24px 0;}
  .error-msg{color:#d98a7a;}

  /* Table */
  .table-toggle-btn{width:100%;text-align:center;background:var(--panel-2);border:1px solid var(--gold-line);color:var(--gold-soft);padding:10px;cursor:pointer;font-family:'Tajawal';font-size:.85rem;border-radius:var(--radius);margin-bottom:10px;}
  .standings-wrap{display:none;overflow-x:auto;}
  .standings-wrap.open{display:block;}
  table.standings{width:100%;border-collapse:collapse;font-size:.8rem;}
  table.standings th{color:var(--text-dim);font-weight:500;padding:8px 6px;border-bottom:1px solid var(--gold-line);}
  table.standings td{padding:8px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);}
  table.standings td.team-cell{text-align:right;display:flex;align-items:center;gap:8px;}

  /* Archive */
  .archive-section{margin-top:30px;border-top:1px solid var(--gold-line);padding-top:20px;}
  .archive-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .archive-input-row{display:flex;gap:8px;margin-bottom:14px;}
  .archive-input-row input{flex:1;background:var(--panel-2);border:1px solid var(--gold-line);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-family:'Tajawal';}
  .archive-input-row button{background:var(--gold);border:none;color:#161310;font-weight:700;padding:10px 20px;border-radius:var(--radius);cursor:pointer;}

  /* News */
  .news-section{margin-top:30px;}
  .news-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);gap:12px;}
  .news-item a{font-size:.85rem;flex:1;}
  .news-item .arrow{color:var(--gold);font-size:.75rem;flex:0 0 auto;}

  h2.section-h{font-size:1.1rem;display:flex;justify-content:space-between;border-bottom:1px solid var(--gold-line);padding-bottom:10px;margin:0 0 14px;}
  .eyebrow{font-size:.65rem;color:var(--text-faint);letter-spacing:1px;}

  .lang-switch{display:flex;gap:4px;background:var(--panel-2);border:1px solid var(--gold-line);border-radius:var(--radius);padding:3px;}
  .lang-btn{background:transparent;border:none;color:var(--text-dim);font-size:.75rem;padding:5px 10px;border-radius:2px;cursor:pointer;font-family:'Tajawal';transition:background .15s,color .15s;}
  .lang-btn.active{background:var(--gold);color:#161310;font-weight:700;}
</style>
</head>
<body>

<div class="mc-wrap">
  <div class="mc-header">
    <div>
      <h1 class="mc-title" id="mcTitle">مركز <span class="accent">المباريات</span></h1>
      <div class="mc-sub" id="mcSub">نتائج، مواعيد، ترتيب وأخبار لأهم مسابقات كرة القدم</div>
    </div>
    <div class="lang-switch" id="langSwitch">
      <button class="lang-btn" data-lang="ar">ع</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>

  <div class="day-strip" id="dayStrip"></div>

  <div id="competitionsToday"></div>

  <div class="table-toggle-btn" id="tableToggleBtn">عرض جدول الترتيب ▾</div>
  <div class="standings-wrap" id="standingsWrap">
    <div id="standingsContent"></div>
  </div>

  <div class="archive-section">
    <h2 class="section-h" id="archiveTitle">البحث في الأرشيف <span class="eyebrow">ARCHIVE</span></h2>
    <div class="archive-input-row">
      <button id="archiveSearchBtn">بحث</button>
      <input type="text" id="archiveInput" placeholder="اسم الفريق (عربي أو إنجليزي)... مثال: Real Madrid أو ريال مدريد">
    </div>
    <div id="archiveResults"></div>
  </div>

  <div class="news-section">
    <h2 class="section-h" id="newsTitle">آخر أخبار الرياضة <span class="eyebrow">NEWS</span></h2>
    <div id="newsResults"><div class="empty-msg" id="newsLoadingMsg">جاري التحميل...</div></div>
  </div>
</div>

<script>
(function(){
  const API_KEY = '3';
  const BASE = 'https://www.thesportsdb.com/api/v1/json/' + API_KEY + '/';

  // ================= i18n =================
  const LEAGUE_LABELS = {
    epl: { ar:'الإنجليزي', en:'Premier League', es:'Premier League' },
    laliga: { ar:'الإسباني', en:'La Liga', es:'La Liga' },
    seriea: { ar:'الإيطالي', en:'Serie A', es:'Serie A' },
    bundesliga: { ar:'الألماني', en:'Bundesliga', es:'Bundesliga' },
    ligue1: { ar:'الفرنسي', en:'Ligue 1', es:'Ligue 1' },
    ucl: { ar:'أبطال أوروبا', en:'Champions League', es:'Liga de Campeones' },
    wc: { ar:'كأس العالم', en:'World Cup', es:'Copa del Mundo' },
    euro: { ar:'يورو', en:'Euro', es:'Eurocopa' },
    copaamerica: { ar:'كوبا أمريكا', en:'Copa America', es:'Copa América' },
    afcon: { ar:'أمم أفريقيا', en:'AFCON', es:'Copa Africana' },
    asiancup: { ar:'كأس آسيا', en:'Asian Cup', es:'Copa Asiática' },
    saudi: { ar:'السعودي', en:'Saudi League', es:'Liga Saudí' },
    egypt: { ar:'المصري', en:'Egyptian League', es:'Liga Egipcia' },
    morocco: { ar:'المغربي', en:'Moroccan League', es:'Liga Marroquí' },
  };

  const T = {
    ar: {
      title1:'مركز ', title2:'المباريات',
      sub:'نتائج، مواعيد، ترتيب وأخبار لأهم مسابقات كرة القدم',
      showStandings:'عرض جدول الترتيب ▾', hideStandings:'إخفاء جدول الترتيب ▴',
      archiveTitle:'البحث في الأرشيف', archiveEyebrow:'ARCHIVE',
      searchBtn:'بحث', archivePlaceholder:'اسم الفريق (عربي أو إنجليزي)... مثال: Real Madrid أو ريال مدريد',
      newsTitle:'آخر أخبار الرياضة', newsEyebrow:'NEWS',
      loading:'جاري التحميل...', loadingMatches:'جاري تحميل المباريات...',
      noMatches:'لا توجد مباريات في هذا اليوم للمسابقات المختارة',
      finished:'انتهت', detailsBtn:'التفاصيل', goalsTab:'الأهداف', statsTab:'الإحصائيات',
      notAvailableMatch:'غير متوفر لهذه المباراة', noGoals:'لا توجد أهداف مسجلة بهذه المباراة',
      statsNotAvailable:'الإحصائيات غير متوفرة لهذه المباراة', unknownPlayer:'غير معروف',
      standingsError:'تعذر تحميل الترتيب', standingsErrorGeneric:'تعذّر تحميل جدول الترتيب حاليًا',
      thRank:'#', thTeam:'الفريق', thPlayed:'لعب', thGD:'فرق', thPoints:'نقاط',
      today:'اليوم', yesterday:'أمس', tomorrow:'غدًا',
      searching:'جاري البحث...', notFoundArabicHint:'لم يتم العثور على الفريق. جرّب البحث بالاسم الإنجليزي للفريق.',
      notFoundGeneric:'لم يتم العثور على نتائج.',
      lastResultsNote:'آخر 15 نتيجة ومباريات قادمة (الحد المتاح مجانًا — لا يوجد أرشيف كامل عبر التاريخ)',
      lastResultsHeading:'آخر النتائج', upcomingHeading:'مباريات قادمة', currentPlayersHeading:'اللاعبون الحاليون',
      noAdditionalData:'لا توجد بيانات إضافية متاحة لهذا الفريق حاليًا',
      newsLoadError:'تعذّر تحميل الأخبار حاليًا', readMore:'← اقرأ المزيد', vs:' مقابل '
    },
    en: {
      title1:'Match ', title2:'Center',
      sub:'Results, fixtures, standings and news for top football competitions',
      showStandings:'Show standings ▾', hideStandings:'Hide standings ▴',
      archiveTitle:'Search Archive', archiveEyebrow:'ARCHIVE',
      searchBtn:'Search', archivePlaceholder:'Team name (Arabic or English)... e.g. Real Madrid',
      newsTitle:'Latest Sports News', newsEyebrow:'NEWS',
      loading:'Loading...', loadingMatches:'Loading matches...',
      noMatches:'No matches today for the selected competitions',
      finished:'Finished', detailsBtn:'Details', goalsTab:'Goals', statsTab:'Stats',
      notAvailableMatch:'Not available for this match', noGoals:'No goals recorded in this match',
      statsNotAvailable:'Stats not available for this match', unknownPlayer:'Unknown',
      standingsError:'Failed to load standings', standingsErrorGeneric:'Could not load the standings table right now',
      thRank:'#', thTeam:'Team', thPlayed:'Pl', thGD:'GD', thPoints:'Pts',
      today:'Today', yesterday:'Yesterday', tomorrow:'Tomorrow',
      searching:'Searching...', notFoundArabicHint:'Team not found. Try searching with the English name.',
      notFoundGeneric:'No results found.',
      lastResultsNote:'Last 15 results and upcoming matches (free tier limit — no full historical archive)',
      lastResultsHeading:'Recent Results', upcomingHeading:'Upcoming Matches', currentPlayersHeading:'Current Players',
      noAdditionalData:'No additional data available for this team right now',
      newsLoadError:'Could not load news right now', readMore:'Read more →', vs:' vs '
    },
    es: {
      title1:'Centro de ', title2:'Partidos',
      sub:'Resultados, calendarios, clasificación y noticias de las principales competiciones de fútbol',
      showStandings:'Ver clasificación ▾', hideStandings:'Ocultar clasificación ▴',
      archiveTitle:'Buscar en el archivo', archiveEyebrow:'ARCHIVO',
      searchBtn:'Buscar', archivePlaceholder:'Nombre del equipo (árabe o inglés)... ej. Real Madrid',
      newsTitle:'Últimas noticias deportivas', newsEyebrow:'NOTICIAS',
      loading:'Cargando...', loadingMatches:'Cargando partidos...',
      noMatches:'No hay partidos hoy para las competiciones seleccionadas',
      finished:'Finalizado', detailsBtn:'Detalles', goalsTab:'Goles', statsTab:'Estadísticas',
      notAvailableMatch:'No disponible para este partido', noGoals:'No hay goles registrados en este partido',
      statsNotAvailable:'Estadísticas no disponibles para este partido', unknownPlayer:'Desconocido',
      standingsError:'No se pudo cargar la clasificación', standingsErrorGeneric:'No se pudo cargar la tabla de clasificación ahora',
      thRank:'#', thTeam:'Equipo', thPlayed:'PJ', thGD:'DG', thPoints:'Pts',
      today:'Hoy', yesterday:'Ayer', tomorrow:'Mañana',
      searching:'Buscando...', notFoundArabicHint:'Equipo no encontrado. Prueba con el nombre en inglés.',
      notFoundGeneric:'No se encontraron resultados.',
      lastResultsNote:'Últimos 15 resultados y próximos partidos (límite del plan gratuito — sin archivo histórico completo)',
      lastResultsHeading:'Resultados recientes', upcomingHeading:'Próximos partidos', currentPlayersHeading:'Jugadores actuales',
      noAdditionalData:'No hay datos adicionales disponibles para este equipo ahora',
      newsLoadError:'No se pudieron cargar las noticias ahora', readMore:'Leer más →', vs:' vs '
    }
  };

  let currentLang = localStorage.getItem('siteLang') || 'ar';

  function applyStaticLang(){
    const t = T[currentLang];
    document.getElementById('mcHtml').setAttribute('lang', currentLang);
    document.getElementById('mcHtml').setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
    document.title = currentLang === 'ar' ? 'مركز المباريات | أحمد شوقي - Sports Docs' : (currentLang === 'en' ? 'Match Center | Ahmed Shawqi - Sports Docs' : 'Centro de Partidos | Ahmed Shawqi - Sports Docs');
    document.getElementById('mcTitle').innerHTML = t.title1 + '<span class="accent">' + t.title2 + '</span>';
    document.getElementById('mcSub').textContent = t.sub;
    document.getElementById('archiveTitle').innerHTML = t.archiveTitle + ' <span class="eyebrow">' + t.archiveEyebrow + '</span>';
    document.getElementById('archiveSearchBtn').textContent = t.searchBtn;
    document.getElementById('archiveInput').placeholder = t.archivePlaceholder;
    document.getElementById('newsTitle').innerHTML = t.newsTitle + ' <span class="eyebrow">' + t.newsEyebrow + '</span>';
    const loadingMsg = document.getElementById('newsLoadingMsg');
    if(loadingMsg) loadingMsg.textContent = t.loading;
    const tableBtn = document.getElementById('tableToggleBtn');
    tableBtn.textContent = standingsWrap.classList.contains('open') ? t.hideStandings : t.showStandings;
    document.querySelectorAll('.lang-btn').forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
  }

  function setLang(lang){
    currentLang = lang;
    localStorage.setItem('siteLang', lang);
    applyStaticLang();
    // Re-render dynamic pieces already loaded so they pick up the new language
    buildDayStripAtBase();
    loadDayMatches();
    loadNews();
  }

  document.getElementById('langSwitch').addEventListener('click', function(e){
    const btn = e.target.closest('.lang-btn');
    if(!btn) return;
    setLang(btn.dataset.lang);
  });
  // ================= /i18n =================

  // ---- Leagues we cover. IDs resolved dynamically where possible, with known fallbacks. ----
  const LEAGUES = [
    { key:'epl', names:['English Premier League'], fallbackId:'4328' },
    { key:'laliga', names:['Spanish La Liga'], fallbackId:'4335' },
    { key:'seriea', names:['Italian Serie A'], fallbackId:'4332' },
    { key:'bundesliga', names:['German Bundesliga'], fallbackId:'4331' },
    { key:'ligue1', names:['French Ligue 1'], fallbackId:'4334' },
    { key:'ucl', names:['UEFA Champions League'], fallbackId:'4480' },
    { key:'wc', names:['FIFA World Cup'], fallbackId:'4429' },
    { key:'euro', names:['UEFA European Championship'], fallbackId:null },
    { key:'copaamerica', names:['Copa America'], fallbackId:null },
    { key:'afcon', names:['African Cup of Nations'], fallbackId:null },
    { key:'asiancup', names:['AFC Asian Cup'], fallbackId:null },
    { key:'saudi', names:['Saudi Professional League','Saudi Pro League'], fallbackId:null },
    { key:'egypt', names:['Egyptian Premier League'], fallbackId:null },
    { key:'morocco', names:['Botola Pro','Moroccan Botola'], fallbackId:null },
  ];
  function leagueLabel(key){ return (LEAGUE_LABELS[key] && LEAGUE_LABELS[key][currentLang]) || key; }

  const CACHE_TTL = 5 * 60 * 1000; // 5 min for live data
  const CACHE_TTL_LONG = 7 * 24 * 60 * 60 * 1000; // 7 days for badges/league ids

  function cacheGet(key, ttl){
    try{
      const raw = localStorage.getItem(key);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if(Date.now() - obj.t > ttl) return null;
      return obj.v;
    }catch(e){ return null; }
  }
  function cacheSet(key, value){
    try{ localStorage.setItem(key, JSON.stringify({t:Date.now(), v:value})); }catch(e){}
  }
  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

  async function safeFetchJSON(url, timeoutMs){
    timeoutMs = timeoutMs || 8000;
    const controller = new AbortController();
    const id = setTimeout(()=>controller.abort(), timeoutMs);
    try{
      const res = await fetch(url, {signal: controller.signal});
      clearTimeout(id);
      if(!res.ok) return null;
      return await res.json();
    }catch(e){
      clearTimeout(id);
      return null;
    }
  }

  function cleanName(s){
    return (s || '').toString().trim().toLowerCase().replace(/\s+/g,' ');
  }

  // ---- Resolve league IDs dynamically once, cache for a week ----
  let leagueIdMap = cacheGet('mc_league_ids_v1', CACHE_TTL_LONG);
  async function resolveLeagueIds(){
    if(leagueIdMap) return leagueIdMap;
    const data = await safeFetchJSON(BASE + 'search_all_leagues.php?s=Soccer', 15000);
    const map = {};
    const allLeagues = (data && data.countries) ? data.countries : [];
    LEAGUES.forEach(function(lg){
      let found = null;
      for(const candidateName of lg.names){
        const match = allLeagues.find(function(entry){
          return cleanName(entry.strLeague) === cleanName(candidateName) ||
                 cleanName(entry.strLeagueAlternate||'').indexOf(cleanName(candidateName)) !== -1;
        });
        if(match){ found = match; break; }
      }
      if(found){
        map[lg.key] = { id: found.idLeague, name: found.strLeague };
      } else if(lg.fallbackId){
        map[lg.key] = { id: lg.fallbackId, name: lg.names[0] };
      } else {
        map[lg.key] = null; // will be hidden
      }
    });
    leagueIdMap = map;
    cacheSet('mc_league_ids_v1', map);
    return map;
  }

  // ---- Team badge lookup (per-team, cached individually — robust vs. league-batch failures) ----
  async function getTeamBadge(teamName){
    if(!teamName) return null;
    const cacheKey = 'mc_badge_' + cleanName(teamName);
    const cached = cacheGet(cacheKey, CACHE_TTL_LONG);
    if(cached !== null) return cached;
    const data = await safeFetchJSON(BASE + 'searchteams.php?t=' + encodeURIComponent(teamName), 8000);
    let badge = null;
    if(data && data.teams && data.teams[0]){
      badge = data.teams[0].strTeamBadge || data.teams[0].strBadge || data.teams[0].strTeamLogo || null;
    }
    cacheSet(cacheKey, badge);
    return badge;
  }

  function renderBadge(container, teamName){
    const span = document.createElement('span');
    span.className = 'team-badge-fallback';
    span.textContent = (teamName||'?').charAt(0);
    container.appendChild(span);
    getTeamBadge(teamName).then(function(url){
      if(url){
        const img = document.createElement('img');
        img.className = 'team-badge';
        img.src = url;
        img.alt = teamName;
        img.onerror = function(){ img.remove(); };
        container.replaceChild(img, span);
      }
    });
  }

  // ---- Day strip ----
  const dayStrip = document.getElementById('dayStrip');
  let selectedDate = new Date();
  function fmtDate(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function labelForOffset(offset){
    if(offset === 0) return T[currentLang].today;
    if(offset === -1) return T[currentLang].yesterday;
    if(offset === 1) return T[currentLang].tomorrow;
    const d = new Date(); d.setDate(d.getDate()+offset);
    return d.getDate() + ' / ' + (d.getMonth()+1);
  }
  function buildDayStrip(){
    dayStrip.innerHTML = '';
    const prevBtn = document.createElement('button');
    prevBtn.className = 'day-nav'; prevBtn.textContent = '◀';
    prevBtn.onclick = function(){ shiftDays(-1); };
    dayStrip.appendChild(prevBtn);
    for(let offset = -2; offset <= 2; offset++){
      const btn = document.createElement('button');
      btn.className = 'day-btn' + (offset === 0 ? ' active' : '');
      btn.textContent = labelForOffset(offset);
      btn.dataset.offset = offset;
      btn.onclick = function(){ selectDay(offset); };
      dayStrip.appendChild(btn);
    }
    const nextBtn = document.createElement('button');
    nextBtn.className = 'day-nav'; nextBtn.textContent = '▶';
    nextBtn.onclick = function(){ shiftDays(1); };
    dayStrip.appendChild(nextBtn);
  }
  let baseOffset = 0;
  function shiftDays(dir){
    baseOffset += dir * 5;
    buildDayStripAtBase();
  }
  function buildDayStripAtBase(){
    dayStrip.innerHTML = '';
    const prevBtn = document.createElement('button');
    prevBtn.className='day-nav'; prevBtn.textContent='◀';
    prevBtn.onclick = function(){ shiftDays(-1); };
    dayStrip.appendChild(prevBtn);
    for(let i=-2;i<=2;i++){
      const offset = baseOffset + i;
      const d = new Date(); d.setDate(d.getDate()+offset);
      const btn = document.createElement('button');
      btn.className = 'day-btn' + (fmtDate(d)===fmtDate(selectedDate) ? ' active':'');
      btn.textContent = offset===0?T[currentLang].today:(offset===-1?T[currentLang].yesterday:(offset===1?T[currentLang].tomorrow: d.getDate()+'/'+(d.getMonth()+1)));
      btn.onclick = (function(dd){ return function(){ selectedDate = dd; buildDayStripAtBase(); loadDayMatches(); }; })(d);
      dayStrip.appendChild(btn);
    }
    const nextBtn = document.createElement('button');
    nextBtn.className='day-nav'; nextBtn.textContent='▶';
    nextBtn.onclick = function(){ shiftDays(1); };
    dayStrip.appendChild(nextBtn);
  }
  function selectDay(offset){
    selectedDate = new Date(); selectedDate.setDate(selectedDate.getDate()+offset);
    baseOffset = offset;
    buildDayStripAtBase();
    loadDayMatches();
  }

  // ---- Load matches for selected day across all resolved leagues ----
  const compContainer = document.getElementById('competitionsToday');

  async function loadDayMatches(){
    compContainer.innerHTML = '<div class="empty-msg">' + T[currentLang].loadingMatches + '</div>';
    const ids = await resolveLeagueIds();
    const dateStr = fmtDate(selectedDate);
    const cacheKey = 'mc_day_v2_' + dateStr;
    let results = cacheGet(cacheKey, CACHE_TTL);
    if(!results){
      results = [];
      const activeLeagues = LEAGUES.filter(function(lg){ return ids[lg.key]; });
      for(const lg of activeLeagues){
        const info = ids[lg.key];
        // events on a specific day across all sports/leagues would need eventsday.php
        const data = await safeFetchJSON(BASE + 'eventsday.php?d=' + dateStr + '&l=' + info.id, 8000);
        if(data && data.events && data.events.length){
          results.push({ key: lg.key, events: data.events });
        }
        await sleep(300);
      }
      cacheSet(cacheKey, results);
    }
    renderDayMatches(results);
  }

  function statusLabel(ev){
    if(ev.strStatus === 'Match Finished' || (ev.intHomeScore !== null && ev.intHomeScore !== '' && ev.strProgress === undefined)){
      return T[currentLang].finished;
    }
    return '';
  }

  function renderDayMatches(groups){
    compContainer.innerHTML = '';
    if(!groups || !groups.length){
      compContainer.innerHTML = '<div class="empty-msg">' + T[currentLang].noMatches + '</div>';
      return;
    }
    groups.forEach(function(group){
      const wrap = document.createElement('div');
      wrap.className = 'league-group';
      const head = document.createElement('div');
      head.className = 'league-head';
      head.innerHTML = '<span>'+leagueLabel(group.key)+'</span>';
      wrap.appendChild(head);
      group.events.forEach(function(ev){
        wrap.appendChild(renderMatchRow(ev));
      });
      compContainer.appendChild(wrap);
    });
  }

  function localDateTimeFromEvent(ev){
    if(!ev.strTime || !ev.dateEvent) return null;
    try{
      const d = new Date(ev.dateEvent + 'T' + ev.strTime + 'Z');
      if(isNaN(d.getTime())) return null;
      const localeCode = currentLang === 'ar' ? 'ar' : (currentLang === 'es' ? 'es' : 'en-GB');
      return {
        time: d.toLocaleTimeString(localeCode, {hour:'2-digit', minute:'2-digit'}),
        date: d.toLocaleDateString(localeCode, {day:'2-digit', month:'2-digit', year:'numeric'})
      };
    }catch(e){ return null; }
  }

  function renderMatchRow(ev){
    const row = document.createElement('div');
    row.className = 'match-row';

    const homeTeam = document.createElement('div');
    homeTeam.className = 'team';
    renderBadge(homeTeam, ev.strHomeTeam);
    const homeName = document.createElement('span');
    homeName.className = 'team-name'; homeName.textContent = ev.strHomeTeam || '—';
    homeTeam.appendChild(homeName);

    const awayTeam = document.createElement('div');
    awayTeam.className = 'team away';
    renderBadge(awayTeam, ev.strAwayTeam);
    const awayName = document.createElement('span');
    awayName.className = 'team-name'; awayName.textContent = ev.strAwayTeam || '—';
    awayTeam.appendChild(awayName);

    const center = document.createElement('div');
    center.className = 'match-center-col';
    const hasScore = ev.intHomeScore !== null && ev.intHomeScore !== undefined && ev.intHomeScore !== '';
    const localDT = localDateTimeFromEvent(ev);
    if(hasScore){
      const score = document.createElement('div');
      score.className = 'match-score';
      score.textContent = ev.intHomeScore + ' - ' + ev.intAwayScore;
      center.appendChild(score);
      const status = document.createElement('div');
      status.className = 'match-status'; status.textContent = T[currentLang].finished;
      center.appendChild(status);
    } else {
      const time = document.createElement('div');
      time.className = 'match-time';
      time.textContent = localDT ? localDT.time : (ev.strTime ? ev.strTime.substring(0,5) : '--:--');
      center.appendChild(time);
    }
    const date = document.createElement('div');
    date.className = 'match-time'; date.textContent = localDT ? localDT.date : (ev.dateEvent || '');
    center.appendChild(date);

    const toggle = document.createElement('button');
    toggle.className = 'match-detail-toggle';
    toggle.textContent = T[currentLang].detailsBtn;

    row.appendChild(homeTeam);
    row.appendChild(center);
    row.appendChild(awayTeam);
    row.appendChild(toggle);

    const details = document.createElement('div');
    details.className = 'match-details';
    details.appendChild(buildDetailTabs(ev));
    row.appendChild(details);

    toggle.onclick = function(){
      details.classList.toggle('open');
    };

    const container = document.createElement('div');
    container.style.width = '100%';
    container.appendChild(row);
    return container;
  }

  function buildDetailTabs(ev){
    const wrap = document.createElement('div');
    const tabs = document.createElement('div'); tabs.className='detail-tabs';
    const goalsTabBtn = document.createElement('button'); goalsTabBtn.className='detail-tab active'; goalsTabBtn.textContent=T[currentLang].goalsTab;
    const statsTabBtn = document.createElement('button'); statsTabBtn.className='detail-tab'; statsTabBtn.textContent=T[currentLang].statsTab;
    tabs.appendChild(goalsTabBtn); tabs.appendChild(statsTabBtn);
    wrap.appendChild(tabs);

    const goalsPane = document.createElement('div'); goalsPane.className='detail-pane active';
    goalsPane.innerHTML = '<div class="empty-msg">' + T[currentLang].loading + '</div>';
    const statsPane = document.createElement('div'); statsPane.className='detail-pane';
    statsPane.innerHTML = '<div class="empty-msg">' + T[currentLang].loading + '</div>';
    wrap.appendChild(goalsPane);
    wrap.appendChild(statsPane);

    goalsTabBtn.onclick = function(){
      goalsTabBtn.classList.add('active'); statsTabBtn.classList.remove('active');
      goalsPane.classList.add('active'); statsPane.classList.remove('active');
    };
    statsTabBtn.onclick = function(){
      statsTabBtn.classList.add('active'); goalsTabBtn.classList.remove('active');
      statsPane.classList.add('active'); goalsPane.classList.remove('active');
    };

    let loaded = false;
    function loadDetails(){
      if(loaded) return; loaded = true;
      loadGoals(ev, goalsPane);
      loadStats(ev, statsPane);
    }
    // load lazily the first time the row is opened
    const observer = new MutationObserver(function(){
      if(wrap.closest('.match-details.open')) loadDetails();
    });
    setTimeout(function(){
      // simple fallback: load on first paint since we can't easily observe parent toggle here
      loadDetails();
    }, 50);

    return wrap;
  }

  function extractMinute(item){
    // Defensive: TheSportsDB timeline fields vary; try every plausible key.
    const candidates = [item.strTime, item.intTime, item.strTimeline, item.strTimelineDetail, item.strMinute];
    for(const c of candidates){
      if(c !== undefined && c !== null && c !== ''){
        const num = String(c).replace(/[^0-9]/g,'');
        if(num) return num + "'";
      }
    }
    return '—';
  }

  async function loadGoals(ev, pane){
    const data = await safeFetchJSON(BASE + 'lookuptimeline.php?id=' + ev.idEvent, 8000);
    const timeline = data && (data.timeline || data.Timeline);
    if(!timeline || !timeline.length){
      pane.innerHTML = '<div class="empty-msg">' + T[currentLang].notAvailableMatch + '</div>';
      return;
    }
    const goals = timeline.filter(function(tl){
      const type = (tl.strTimeline || tl.strEvent || tl.strEventType || '').toString().toLowerCase();
      return type.indexOf('goal') !== -1 || type.indexOf('هدف') !== -1 || tl.strTimelineType === 'Goal';
    });
    if(!goals.length){
      pane.innerHTML = '<div class="empty-msg">' + T[currentLang].noGoals + '</div>';
      return;
    }
    pane.innerHTML = '';
    goals.forEach(function(g){
      const row = document.createElement('div'); row.className = 'goal-row';
      const player = g.strPlayer || g.strTimelineDetail || g.strPlayerName || T[currentLang].unknownPlayer;
      const isHome = (g.strHome === 'Yes' || g.idTeam === ev.idHomeTeam);
      row.innerHTML = '<span class="side">⚽ ' + player + '</span><span>' + extractMinute(g) + '</span>';
      pane.appendChild(row);
    });
  }

  async function loadStats(ev, pane){
    const data = await safeFetchJSON(BASE + 'lookupeventstats.php?id=' + ev.idEvent, 8000);
    const stats = data && (data.eventstats || data.eventStats);
    if(!stats || !stats.length){
      pane.innerHTML = '<div class="empty-msg">' + T[currentLang].statsNotAvailable + '</div>';
      return;
    }
    pane.innerHTML = '';
    stats.forEach(function(s){
      const home = parseFloat(s.intHome) || 0;
      const away = parseFloat(s.intAway) || 0;
      const total = home + away || 1;
      const row = document.createElement('div'); row.className = 'stat-row';
      row.innerHTML =
        '<div class="stat-label"><span>' + home + '</span><span>' + (s.strStat||'') + '</span><span>' + away + '</span></div>' +
        '<div class="stat-bar"><span class="fill-home" style="width:'+(home/total*100)+'%"></span><span class="fill-away" style="width:'+(away/total*100)+'%"></span></div>';
      pane.appendChild(row);
    });
  }

  // ---- Standings toggle ----
  const tableToggleBtn = document.getElementById('tableToggleBtn');
  const standingsWrap = document.getElementById('standingsWrap');
  let standingsLoaded = false;
  tableToggleBtn.onclick = async function(){
    standingsWrap.classList.toggle('open');
    tableToggleBtn.textContent = standingsWrap.classList.contains('open') ? T[currentLang].hideStandings : T[currentLang].showStandings;
    if(standingsWrap.classList.contains('open') && !standingsLoaded){
      standingsLoaded = true;
      const ids = await resolveLeagueIds();
      const content = document.getElementById('standingsContent');
      content.innerHTML = '<div class="empty-msg">' + T[currentLang].loading + '</div>';
      const eplInfo = ids['epl'];
      if(!eplInfo){ content.innerHTML = '<div class="error-msg">' + T[currentLang].standingsError + '</div>'; return; }
      const data = await safeFetchJSON(BASE + 'lookuptable.php?l=' + eplInfo.id + '&s=2025-2026', 15000);
      if(!data || !data.table){
        content.innerHTML = '<div class="error-msg">' + T[currentLang].standingsErrorGeneric + '</div>';
        return;
      }
      const t = T[currentLang];
      let html = '<table class="standings"><thead><tr><th>'+t.thRank+'</th><th>'+t.thTeam+'</th><th>'+t.thPlayed+'</th><th>'+t.thGD+'</th><th>'+t.thPoints+'</th></tr></thead><tbody>';
      data.table.forEach(function(row){
        html += '<tr><td>'+row.intRank+'</td><td class="team-cell">'+row.strTeam+'</td><td>'+row.intPlayed+'</td><td>'+row.intGoalDifference+'</td><td>'+row.intPoints+'</td></tr>';
      });
      html += '</tbody></table>';
      content.innerHTML = html;
    }
  };

  // ---- Archive search (bilingual dictionary) ----
  const AR_EN_TEAMS = {
    'الأهلي':'Al Ahly','الزمالك':'Zamalek','ريال مدريد':'Real Madrid','برشلونة':'Barcelona',
    'مانشستر يونايتد':'Manchester United','مانشستر سيتي':'Manchester City','ليفربول':'Liverpool',
    'تشيلسي':'Chelsea','أرسنال':'Arsenal','يوفنتوس':'Juventus','ميلان':'AC Milan','إنتر ميلان':'Inter',
    'بايرن ميونخ':'Bayern Munich','باريس سان جيرمان':'Paris Saint-Germain','أتلتيكو مدريد':'Atletico Madrid',
    'توتنهام':'Tottenham Hotspur','الهلال':'Al Hilal','النصر':'Al Nassr','الاتحاد':'Al Ittihad',
    'الوداد':'Wydad AC','الرجاء':'Raja Casablanca','الترجي':'Esperance Sportive de Tunis'
  };

  document.getElementById('archiveSearchBtn').onclick = async function(){
    const input = document.getElementById('archiveInput').value.trim();
    const resultsDiv = document.getElementById('archiveResults');
    if(!input){ return; }
    let searchTerm = input;
    if(AR_EN_TEAMS[input]) searchTerm = AR_EN_TEAMS[input];
    const t = T[currentLang];
    resultsDiv.innerHTML = '<div class="empty-msg">' + t.searching + '</div>';

    const teamData = await safeFetchJSON(BASE + 'searchteams.php?t=' + encodeURIComponent(searchTerm), 8000);
    if(!teamData || !teamData.teams || !teamData.teams[0]){
      const looksArabic = /[\u0600-\u06FF]/.test(input);
      resultsDiv.innerHTML = looksArabic
        ? '<div class="empty-msg">' + t.notFoundArabicHint + '</div>'
        : '<div class="empty-msg">' + t.notFoundGeneric + '</div>';
      return;
    }
    const team = teamData.teams[0];
    const [pastData, nextData, playersData] = await Promise.all([
      safeFetchJSON(BASE + 'eventslast.php?id=' + team.idTeam, 8000),
      safeFetchJSON(BASE + 'eventsnext.php?id=' + team.idTeam, 8000),
      safeFetchJSON(BASE + 'lookup_all_players.php?id=' + team.idTeam, 8000)
    ]);

    let html = '<h3 style="color:var(--gold-soft);font-size:1rem;">' + team.strTeam + '</h3>';
    html += '<p style="color:var(--text-faint);font-size:.8rem;">' + t.lastResultsNote + '</p>';

    const pastEvents = (pastData && pastData.results) || [];
    if(pastEvents.length){
      html += '<h4 style="color:var(--text-dim);font-size:.85rem;margin-top:14px;">' + t.lastResultsHeading + '</h4>';
      pastEvents.forEach(function(ev){
        html += '<div class="goal-row"><span>'+ev.strHomeTeam+' '+ev.intHomeScore+' - '+ev.intAwayScore+' '+ev.strAwayTeam+'</span><span>'+ev.dateEvent+'</span></div>';
      });
    }
    const nextEvents = (nextData && nextData.events) || [];
    if(nextEvents.length){
      html += '<h4 style="color:var(--text-dim);font-size:.85rem;margin-top:14px;">' + t.upcomingHeading + '</h4>';
      nextEvents.forEach(function(ev){
        html += '<div class="goal-row"><span>'+ev.strHomeTeam+t.vs+ev.strAwayTeam+'</span><span>'+ev.dateEvent+'</span></div>';
      });
    }
    const players = (playersData && playersData.player) || [];
    if(players.length){
      html += '<h4 style="color:var(--text-dim);font-size:.85rem;margin-top:14px;">' + t.currentPlayersHeading + '</h4>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
      players.slice(0,20).forEach(function(p){
        html += '<span style="background:var(--panel-2);padding:4px 10px;border-radius:2px;font-size:.75rem;">'+p.strPlayer+'</span>';
      });
      html += '</div>';
    }
    if(!pastEvents.length && !nextEvents.length && !players.length){
      html += '<div class="empty-msg">' + t.noAdditionalData + '</div>';
    }
    resultsDiv.innerHTML = html;
  };

  // ---- News (BBC Arabic Sport RSS via allorigins /get — more reliable than /raw) ----
  async function loadNews(){
    const container = document.getElementById('newsResults');
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://feeds.bbci.co.uk/arabic/sport/rss.xml');
    const data = await safeFetchJSON(proxyUrl, 10000);
    if(!data || !data.contents){
      container.innerHTML = '<div class="error-msg">' + T[currentLang].newsLoadError + '</div>';
      return;
    }
    try{
      const parser = new DOMParser();
      const xml = parser.parseFromString(data.contents, 'text/xml');
      const items = Array.from(xml.querySelectorAll('item')).slice(0, 8);
      if(!items.length){
        container.innerHTML = '<div class="error-msg">' + T[currentLang].newsLoadError + '</div>';
        return;
      }
      container.innerHTML = '';
      items.forEach(function(item){
        const title = item.querySelector('title') ? item.querySelector('title').textContent : '';
        const link = item.querySelector('link') ? item.querySelector('link').textContent : '#';
        const div = document.createElement('div'); div.className = 'news-item';
        const a = document.createElement('a');
        a.href = link; a.target = '_blank'; a.rel = 'noopener'; a.textContent = title;
        const arrow = document.createElement('span'); arrow.className='arrow'; arrow.textContent = T[currentLang].readMore;
        div.appendChild(a); div.appendChild(arrow);
        container.appendChild(div);
      });
    }catch(e){
      container.innerHTML = '<div class="error-msg">' + T[currentLang].newsLoadError + '</div>';
    }
  }

  // ---- Init ----
  applyStaticLang();
  buildDayStripAtBase();
  loadDayMatches();
  loadNews();
})();
</script>
</body>
</html>
